<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monta Pedidos - Consultar Produtos</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabaseClient.js" defer></script>
<script src="./products-consult.js" defer></script>
</head>
<body class="app-body">
  <header class="topbar">
    <h1 class="brand">Monta Pedidos</h1>
    <div class="topbar-actions">
      <button type="button" class="profile-icon" aria-label="Ir para perfil" onclick="window.location.href='profile.html'">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5z"></path>
        </svg>
      </button>
      <button type="button" id="logoutButton">Logout</button>
    </div>
  </header>

  <main class="main-content">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="dashboard.html">Início</a>
      <span class="crumb-sep">></span>
      <a href="products-menu.html">Produtos</a>
      <span class="crumb-sep">></span>
      <span>Consultar Produtos</span>
    </nav>
    <section class="list-card">
      <h2>Consultar Produtos</h2>
      <div class="search-row search-row-products">
        <input type="text" id="productSearchInput" placeholder="Buscar por ID ou nome">
        <select id="productRegionalFilter">
          <option value="">Todas as regionais</option>
          <option value="ESPIRITO SANTO">ESPIRITO SANTO</option>
          <option value="RIO DE JANEIRO">RIO DE JANEIRO</option>
        </select>
        <input type="text" id="productPriceMinFilter" inputmode="decimal" placeholder="Preco min">
        <input type="text" id="productPriceMaxFilter" inputmode="decimal" placeholder="Preco max">
        <input type="text" id="productWeightMinFilter" inputmode="decimal" placeholder="Peso min">
        <input type="text" id="productWeightMaxFilter" inputmode="decimal" placeholder="Peso max">
        <button type="button" id="productSearchButton">Buscar</button>
        <button type="button" id="productClearFiltersButton">Limpar</button>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Regional</th>
              <th>Preco Tabela</th>
              <th>Preco Margem 0</th>
              <th>Peso</th>
              <th>Variavel</th>
              <th>Margem</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </div>

      <div class="pagination-row">
        <button type="button" id="prevPageButton">Anterior</button>
        <span id="paginationInfo">Pagina 1</span>
        <button type="button" id="nextPageButton">Proxima</button>
      </div>
      <p id="consultFeedback" class="form-feedback"></p>
    </section>
  </main>
</body>
</html>
