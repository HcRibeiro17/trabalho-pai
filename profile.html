<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monta Pedidos - Perfil</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabaseClient.js" defer></script>
<script src="./profile.js" defer></script>
</head>
<body class="app-body">
  <header class="topbar">
    <h1 class="brand">Monta Pedidos</h1>
    <div class="topbar-actions">
      <button type="button" class="profile-icon" aria-label="Ir para perfil" onclick="window.location.href='profile.html'">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5z"></path>
        </svg>
      </button>
      <button type="button" id="logoutButton">Logout</button>
    </div>
  </header>

  <main class="main-content">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="dashboard.html">Início</a>
      <span class="crumb-sep">></span>
      <span>Perfil</span>
    </nav>
    <section class="form-card">
      <h2>Perfil do Usuario</h2>

      <div class="profile-photo-block">
        <img id="profileAvatarPreview" class="profile-avatar-preview" alt="Foto de perfil">
        <label>
          Foto de perfil
          <input type="file" id="profileAvatarFile" accept="image/*">
        </label>
      </div>

      <label>
        E-mail
        <input type="text" id="profileEmail" readonly>
      </label>

      <label>
        Login (nome de usuario)
        <input type="text" id="profileName" maxlength="40" placeholder="Digite um nome unico">
      </label>

      <label>
        Cargo
        <select id="profileRole">
          <option value="">Selecione</option>
          <option value="gerente">Gerente</option>
          <option value="supervisor">Supervisor</option>
          <option value="vendedor">Vendedor</option>
        </select>
      </label>

      <label>
        Regional
        <select id="profileRegional">
          <option value="">Selecione</option>
          <option value="ESPIRITO SANTO">ESPIRITO SANTO</option>
          <option value="RIO DE JANEIRO">RIO DE JANEIRO</option>
        </select>
      </label>

      <p id="profileFeedback" class="form-feedback"></p>
      <button type="button" id="saveProfileButton">Salvar perfil</button>
    </section>

    <section class="list-card">
      <h2>Meus Pedidos</h2>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID Pedido</th>
              <th>Cliente</th>
              <th>Total</th>
              <th>Status</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="myOrdersTableBody"></tbody>
        </table>
      </div>
      <div class="pagination-row">
        <button type="button" id="myOrdersPrevPageButton">Anterior</button>
        <span id="myOrdersPaginationInfo">Pagina 1</span>
        <button type="button" id="myOrdersNextPageButton">Proxima</button>
      </div>
      <p id="myOrdersFeedback" class="form-feedback"></p>
    </section>
  </main>
</body>
</html>
