<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monta Pedidos - Início</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabaseClient.js" defer></script>
<script src="./dashboard.js" defer></script>
</head>
<body class="app-body dashboard-home">
  <header class="topbar">
    <h1 class="brand">Monta Pedidos</h1>
    <div class="topbar-actions">
      <button type="button" class="profile-icon" aria-label="Ir para perfil" onclick="window.location.href='profile.html'">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5z"></path>
        </svg>
      </button>
      <button type="button" id="logoutButton">Logout</button>
    </div>
  </header>

  <main class="main-content home-main">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <span>Início</span>
    </nav>

    <section class="welcome-card">
      <h2 id="welcomeName">Bem-vindo</h2>
      <p id="welcomeMeta"></p>
    </section>

    <section class="quick-actions home-actions">
      <button type="button" onclick="window.location.href='products-menu.html'">Produtos</button>
      <button type="button" onclick="window.location.href='clients-menu.html'">Clientes</button>
      <button type="button" onclick="window.location.href='orders-consult.html'">Pedidos</button>
      <button type="button" class="new-order-cta" onclick="window.location.href='new-order.html'">Novo Pedido</button>
    </section>
  </main>
</body>
</html>
